name: CI/CD Pipeline - Tests & Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test Python Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov

    - name: Run unit tests
      run: |
        pytest tests/test_app.py -v --tb=short

    - name: Run Selenium smoke tests
      run: |
        pytest tests/test_selenium.py -v --tb=short

    - name: Check syntax errors
      run: |
        python -m py_compile app.py
        python -m py_compile app/__init__.py
        python -m py_compile app/models.py
        python -m py_compile app/routes.py
        python -m py_compile app/monitor.py

  docker-build:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker build -t api-monitor:latest .
        echo "Docker image built successfully"

    - name: Test Docker image
      run: |
        docker run --rm -d --name api-monitor-test -p 5000:5000 api-monitor:latest
        sleep 5
        if docker logs api-monitor-test | grep -q "API MONITOR STARTED"; then
          echo "Docker container started successfully"
        else
          echo "Docker container running but monitor status unknown"
        fi
        docker stop api-monitor-test || true
