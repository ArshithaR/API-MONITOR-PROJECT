"""
Prometheus Configuration for Metrics
Save as prometheus.yml in project root
"""

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'api-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-monitor'
    static_configs:
      - targets: ['localhost:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'postgresql'
    static_configs:
      - targets: ['localhost:5432']
    scrape_interval: 30s
