<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Monitor - Home</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        p { color: #7f8c8d; margin-bottom: 2rem; }
        .btn {
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            margin: 0 10px;
            transition: 0.3s;
        }
        .btn-login { background-color: #3498db; color: white; }
        .btn-register { border: 2px solid #3498db; color: #3498db; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 API Performance Monitor</h1>
        <p>Track your endpoints, check response times, and ensure 100% uptime.</p>
        
        <div class="actions">
            <a href="{{ url_for('main.login') }}" class="btn btn-login">Login</a>
            <a href="{{ url_for('main.register') }}" class="btn btn-register">Register</a>
        </div>
    </div>
</body>
</html>
