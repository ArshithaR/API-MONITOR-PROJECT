<!DOCTYPE html>
<html>
<head>
    <title>API Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🚀 API Monitor</a>
            <div>
                {% if current_user.is_authenticated %}
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.dashboard') }}">Dashboard</a>
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.export_csv') }}">CSV</a>
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.logout') }}">Logout</a>
                {% else %}
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.login') }}">Login</a>
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.register') }}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-info">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
