{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">Generate CSV</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="chart_type" class="form-label">Select Chart Type</label>
                        <select class="form-control" id="chart_type" name="chart_type" required>
                            <option value="response_time">Response Time</option>
                            <option value="status_codes">Status Codes</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Download CSV</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
