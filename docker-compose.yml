version: '3.8'

services:
  api-monitor:
    build: .
    container_name: api-monitor-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
    volumes:
      - ./instance:/app/instance
      - ./templates:/app/templates
    networks:
      - api-monitor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  api-monitor-network:
    driver: bridge
